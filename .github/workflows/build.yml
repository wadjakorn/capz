name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # Pre-create the draft release once so all matrix jobs upload into the
  # same release. tauri-action's "find-or-create by tag" is not atomic; when
  # matrix jobs race they each create their own draft (caused split v0.1.9
  # drafts). With releaseId pinned here, no race.
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            // Reuse an existing draft for this tag if one exists; otherwise create.
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100,
            });
            let release = releases.find(r => r.tag_name === tag && r.draft);
            if (!release) {
              const res = await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: tag,
                name: `capz v${version}`,
                body: 'See assets below. Auto-update will pick this up on the next interval (default 24h) or via Settings → Updates → Check now.',
                draft: true,
                prerelease: false,
              });
              release = res.data;
            }
            core.setOutput('release_id', release.id);

  build:
    needs: [create-release]
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # On tag push: build, sign, upload to a draft GitHub Release, and
      # publish latest.json (consumed by tauri-plugin-updater).
      # On workflow_dispatch: tagName resolves to empty → build only,
      # no release side-effects.
      - name: Build + release via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS free self-signed code signing (NO Apple Developer Program, NO notarization).
          # Gives every release a STABLE code identity so the Screen Recording (TCC)
          # grant survives auto-updates instead of dying on every cdhash change.
          # Windows runner ignores these (macOS-only bundler code path).
          # Notarization is auto-skipped because APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # are intentionally absent (see tauri-bundler macos/app.rs notarize_auth gate).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      # Always upload build artifacts on non-tag dispatch so they are
      # downloadable from the workflow run for quick smoke-testing.
      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: capz-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: ignore

  # On tag push: pull the freshly-built latest.json off the GitHub Release
  # (created by tauri-action above, still in draft) and publish it to the
  # gh-pages branch so the updater endpoint at
  # https://wadjakorn.github.io/capz/latest.json serves it without the
  # Azure-Blob redirect that breaks tauri-plugin-updater 2.10.1.
  publish-meta:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            -p latest.json -O latest.json --clobber

      - name: Commit + push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(pages): update channel to ${GITHUB_REF_NAME}"
          git push origin gh-pages
