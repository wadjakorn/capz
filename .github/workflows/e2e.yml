name: e2e

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly tier-2 (tauri-driver smoke) at 04:13 UTC.
    - cron: "13 4 * * *"
  workflow_dispatch:

jobs:
  tier1-web:
    name: tier 1 — web (mocked IPC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:web
        env:
          CI: "1"
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7

  tier2-tauri:
    name: tier 2 — tauri-driver smoke (linux)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb
      - run: cargo install tauri-driver --locked
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --debug
      - name: Tier 2 smoke under xvfb
        run: xvfb-run --auto-servernum pnpm test:e2e:tauri
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-traces
          path: e2e/test-results/
          retention-days: 14
