name: Update Homebrew Cask

# Fires after a GitHub Release is published (not draft). Renders the cask from
# packaging/homebrew-cask/capz.rb (the source of truth — it carries the
# quarantine-stripping postflight), fills in version + SHA256 of the two macOS
# .dmg assets, and pushes Casks/capz.rb to the wadjakorn/homebrew-capz tap.
#
# Requires repo secret HOMEBREW_TAP_TOKEN: a fine-grained PAT with
# Contents: write on wadjakorn/homebrew-capz.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout capz (cask template source of truth)
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download dmgs and compute SHA256
        id: sha
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          ARM_DMG="capz_${VERSION}_aarch64.dmg"
          INTEL_DMG="capz_${VERSION}_x64.dmg"
          curl -fL -o "$ARM_DMG"   "${BASE}/${ARM_DMG}"
          curl -fL -o "$INTEL_DMG" "${BASE}/${INTEL_DMG}"
          ARM_SHA=$(shasum -a 256 "$ARM_DMG"   | awk '{print $1}')
          INTEL_SHA=$(shasum -a 256 "$INTEL_DMG" | awk '{print $1}')
          echo "arm=$ARM_SHA"     >> "$GITHUB_OUTPUT"
          echo "intel=$INTEL_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: wadjakorn/homebrew-capz
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render cask from template
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          ARM:     ${{ steps.sha.outputs.arm }}
          INTEL:   ${{ steps.sha.outputs.intel }}
        run: |
          mkdir -p tap/Casks
          python3 - <<'PY'
          import os, re
          s = open("packaging/homebrew-cask/capz.rb").read()
          s = re.sub(r'version "[^"]*"',
                     'version "%s"' % os.environ["VERSION"], s, count=1)
          # Rewrite the arm+intel sha256 stanza together so the `intel: "x64"`
          # on the `arch` line is never matched by accident, and so the
          # uppercase REPLACE_WITH_* placeholders (which a [0-9a-f]+ pattern
          # cannot match) are always substituted.
          s, n = re.subn(
              r'sha256 arm:\s*"[^"]*",\s*intel:\s*"[^"]*"',
              'sha256 arm:   "%s",\n         intel: "%s"'
              % (os.environ["ARM"], os.environ["INTEL"]),
              s, count=1)
          if n != 1:
              raise SystemExit("sha256 stanza not found in template — aborting")
          open("tap/Casks/capz.rb", "w").write(s)
          print(s)
          PY

      - name: Commit and push
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add Casks/capz.rb
          git commit -m "capz ${{ steps.tag.outputs.version }}"
          git push
